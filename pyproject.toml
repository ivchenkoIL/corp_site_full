[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["corp_site/tickets/migrations"]

[tool.ruff.lint]
# I — сортировка импортов, B — bugbear, UP — модернизация синтаксиса,
# DJ — Django-специфичные правила.
extend-select = ["I", "B", "UP", "DJ"]

[tool.coverage.run]
source = ["tickets", "corp_site"]
omit = ["*/migrations/*", "manage.py", "*/wsgi.py", "*/asgi.py"]

[tool.coverage.report]
show_missing = true
