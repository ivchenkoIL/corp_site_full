{% extends "base.html" %}
{% block title %}В архив{% endblock %}
{% block content %}
<h1>Перенести заявку в архив</h1>
<p>Заявка &laquo;{{ ticket.title }}&raquo; будет скрыта из списка, но сохранится
    в архиве вместе с комментариями. Восстановить её можно со страницы заявки.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">В архив</button>
    <a href="{% url 'ticket_detail' ticket.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
