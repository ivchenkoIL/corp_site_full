name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run linter
        run: ruff check .
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        # Версии обязательно в кавычках: без них YAML читает 3.10 как число 3.1.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage --no-cache-dir
      - name: Check Django configuration
        working-directory: corp_site
        run: python manage.py check
      - name: Run tests with coverage
        working-directory: corp_site
        run: |
          coverage run manage.py test
          coverage report --fail-under=75

  # Деплой гейтится на зелёный CI: в render.yaml autoDeploy выключен,
  # Render деплоит только по этому хуку после успешных тестов на main.
  # Секрет RENDER_DEPLOY_HOOK_URL: Render Dashboard -> corp-site ->
  # Settings -> Deploy Hook, затем GitHub -> Settings -> Secrets -> Actions.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::Секрет RENDER_DEPLOY_HOOK_URL не задан — деплой пропущен."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK" > /dev/null
          echo "Деплой Render запущен."
