services:
  - type: web
    name: corp-site
    runtime: python
    plan: free
    buildCommand: "./bin/build.sh"
    startCommand: "cd corp_site && gunicorn corp_site.wsgi:application --bind 0.0.0.0:$PORT"
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.6"
      # Ключ Reve API задаётся вручную в Render Dashboard (Environment),
      # sync: false запрещает хранить его в репозитории.
      - key: REVE_API_KEY
        sync: false
      # Сколько AI-генераций в сутки разрешает наш сервер (защита кредитов).
      - key: AI_DAILY_LIMIT
        value: "40"
